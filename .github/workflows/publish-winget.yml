name: Publish Winget

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version/tag to submit, e.g. 2026042900-slskdn.202'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  WINGETCREATE_GITHUB_TOKEN: ${{ secrets.WINGETCREATE_GITHUB_TOKEN }}

permissions:
  contents: read

jobs:
  submit:
    name: Submit Winget PR
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Require Winget token
        if: ${{ env.WINGETCREATE_GITHUB_TOKEN == '' }}
        shell: pwsh
        run: |
          Write-Error "WINGETCREATE_GITHUB_TOKEN is not configured; Winget submission cannot open a PR against microsoft/winget-pkgs"
          exit 1

      - name: Download wingetcreate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          Get-Item .\wingetcreate.exe | Format-List Name,Length,LastWriteTime

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          gh release download "${{ inputs.version }}" `
            --repo ${{ github.repository }} `
            --pattern "slskdn-main-win-x64.zip"

      - name: Prepare stable manifests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ReleaseVersion = "${{ inputs.version }}"
          if ($ReleaseVersion -match '^(\d{10})-slskdn\.(\d+)$') {
            $WingetVersion = "$($Matches[1]).$($Matches[2])"
          } else {
            $WingetVersion = $ReleaseVersion.Replace('-', '.')
          }
          $InstallerUrl = "https://github.com/${{ github.repository }}/releases/download/$ReleaseVersion/slskdn-main-win-x64.zip"
          $InstallerSha = (Get-FileHash slskdn-main-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()

          bash packaging/scripts/update-winget-manifests.sh `
            stable `
            $ReleaseVersion `
            $InstallerUrl `
            $InstallerSha `
            $ReleaseVersion

          New-Item -ItemType Directory -Force winget-submit | Out-Null
          $WingetSubmitPath = Join-Path "winget-submit" "snapetech.slskdn.yaml"
          @(
            'PackageIdentifier: snapetech.slskdn',
            "PackageVersion: `"$WingetVersion`"",
            'PackageLocale: en-US',
            'Publisher: slskdN Team',
            'PublisherUrl: https://github.com/snapetech',
            'PublisherSupportUrl: https://github.com/snapetech/slskdn/issues',
            'PackageName: slskdN',
            'PackageUrl: https://github.com/snapetech/slskdn',
            'License: AGPL-3.0-or-later',
            'LicenseUrl: https://github.com/snapetech/slskdn/blob/main/LICENSE',
            'ShortDescription: Soulseek client with built-in SongID and Discovery Graph',
            'Description: slskdN is an unofficial batteries-included fork of slskd that makes identity and discovery first-class features for Soulseek.',
            'Moniker: slskdn',
            'Tags:',
            '- soulseek',
            '- p2p',
            '- music',
            '- filesharing',
            "ReleaseNotes: Stable Release $ReleaseVersion",
            "ReleaseNotesUrl: https://github.com/${{ github.repository }}/releases/tag/$ReleaseVersion",
            'InstallerType: zip',
            "ReleaseDate: $(Get-Date -AsUTC -Format yyyy-MM-dd)",
            'NestedInstallerType: portable',
            'NestedInstallerFiles:',
            '- RelativeFilePath: slskd.exe',
            '  PortableCommandAlias: slskdn',
            'Commands:',
            '- slskdn',
            'Installers:',
            '- Architecture: x64',
            "  InstallerUrl: $InstallerUrl",
            "  InstallerSha256: $InstallerSha",
            'ManifestType: singleton',
            'ManifestVersion: 1.6.0'
          ) | Set-Content -Path $WingetSubmitPath -Encoding utf8
          "WINGET_SUBMIT_PATH=$WingetSubmitPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Submit manifests to winget-pkgs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ReleaseVersion = "${{ inputs.version }}"
          if ($ReleaseVersion -notmatch '^\d{10}-slskdn\.\d+$') {
            Write-Error "Expected stable release version like 2026042900-slskdn.202, got '$ReleaseVersion'"
            exit 1
          }

          if ($ReleaseVersion -match '^(\d{10})-slskdn\.(\d+)$') {
            $WingetVersion = "$($Matches[1]).$($Matches[2])"
          } else {
            $WingetVersion = $ReleaseVersion.Replace('-', '.')
          }
          $InstallerUrl = "https://github.com/${{ github.repository }}/releases/download/$ReleaseVersion/slskdn-main-win-x64.zip"

          Write-Host "Submitting Winget update for snapetech.slskdn"
          Write-Host "Release version: $ReleaseVersion"
          Write-Host "Winget version:  $WingetVersion"
          Write-Host "Installer URL:   $InstallerUrl"

          .\wingetcreate.exe submit $env:WINGET_SUBMIT_PATH `
            -t $env:WINGETCREATE_GITHUB_TOKEN
