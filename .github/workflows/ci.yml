name: CI
on:
  push:
    # Only build on version tags, not on every push to master
    # build-dev-* and build-main-* tags are handled by build-on-tag.yml
    tags: 
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-slskdn.[0-9]+"
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  packages: write
  actions: write
jobs:
  build:
    name: Build and Test
    # Uses self-hosted if available (set PREFER_SELF_HOSTED=false to use GitHub-hosted)
    runs-on: ${{ vars.PREFER_SELF_HOSTED != 'false' && 'self-hosted' || 'ubuntu-latest' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET (GitHub-hosted)
        if: ${{ !contains(runner.name, 'keith') }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify .NET (self-hosted)
        if: ${{ contains(runner.name, 'keith') }}
        run: |
          echo "Using pre-installed .NET SDK"
          dotnet --version

      - name: Setup Soulfind (Docker)
        if: ${{ !contains(runner.name, 'keith') }}
        run: |
          # Pull Soulfind Docker image for protocol contract tests
          # Image: ghcr.io/soulfind-dev/soulfind (official Soulseek server simulator)
          docker pull ghcr.io/soulfind-dev/soulfind:latest || echo "Soulfind image not available - protocol tests will skip"
        continue-on-error: true

      - name: Set Environment Variables
        id: version
        run: |
          # Get the latest slskdn release tag only (not build-trigger tags like build-main-*)
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-slskdn\.[0-9]+$' | head -n1)
          LATEST_TAG=${LATEST_TAG:-0.24.5-slskdn.1}
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            PATCH=0
          else
            PATCH=65534
          fi
          VERSION="${LATEST_TAG}.${PATCH}+$(git rev-parse --short HEAD)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: NuGet Vulnerability Scan
        run: |
          # Use -p:Version=0.0.0 to prevent the VERSION env var from being read as an MSBuild property,
          # which would cause NuGet to reject build-main-* prefixed strings as invalid semver.
          dotnet restore src/slskd/slskd.csproj -p:Version=0.0.0
          # List vulnerable packages (--vulnerable flag requires .NET 8+ SDK)
          dotnet list src/slskd/slskd.csproj package --vulnerable --include-transitive 2>&1 | tee /tmp/nuget-vuln.txt
          # Fail if any HIGH or CRITICAL severity found
          if grep -qiE 'High|Critical' /tmp/nuget-vuln.txt; then
            echo ""
            echo "::error::NuGet vulnerability scan found HIGH or CRITICAL severity packages."
            cat /tmp/nuget-vuln.txt
            exit 1
          fi

      - name: AUR sha256sum Consistency Check
        run: |
          aur_dir="packaging/aur"
          fail=0
          for pkgbuild in PKGBUILD PKGBUILD-bin; do
            pb="$aur_dir/$pkgbuild"
            [[ -f "$pb" ]] || continue
            sums_line=$(grep '^sha256sums=' "$pb" | head -1)
            sums=( $(echo "$sums_line" | grep -oP "(?<=')[^']+(?=')" ) )
            declare -A files=( [1]="slskd.service" [2]="slskd.yml" [3]="slskd.sysusers" )
            for idx in "${!files[@]}"; do
              fname="${files[$idx]}"
              fpath="$aur_dir/$fname"
              expected="${sums[$idx]:-}"
              [[ "$expected" == "SKIP" || -z "$expected" ]] && continue
              [[ -f "$fpath" ]] || continue
              actual=$(sha256sum "$fpath" | awk '{print $1}')
              if [[ "$actual" != "$expected" ]]; then
                echo "::error::AUR hash mismatch in $pkgbuild for $fname"
                echo "  $pkgbuild has: $expected"
                echo "  Actual is:     $actual"
                fail=1
              fi
            done
          done
          if [[ "$fail" -eq 1 ]]; then
            echo "::error::packaging/aur sha256sums are out of sync. Update before merging."
            exit 1
          fi
          echo "AUR sha256sums OK"

      - name: Release Gate
        run: bash packaging/scripts/run-release-gate.sh

      - name: Upload Static Web Content
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: web-content
          path: src/web/build
  
  publish:
    name: Publish
    runs-on: ${{ vars.PREFER_SELF_HOSTED != 'false' && 'self-hosted' || 'ubuntu-latest' }}
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        runtime:
          - "win-x64"
          - "win-arm64"
          - "linux-x64"
          - "linux-arm"
          - "linux-arm64"
          - "linux-musl-x64"
          - "linux-musl-arm"
          - "linux-musl-arm64"
          - "osx-x64"
          - "osx-arm64"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET (GitHub-hosted)
        if: ${{ !contains(runner.name, 'keith') }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify .NET (self-hosted)
        if: ${{ contains(runner.name, 'keith') }}
        run: dotnet --version

      - name: Set Environment Variables
        run: |
          echo "VERSION=${{ needs.build.outputs.version }}" >> $GITHUB_ENV

      - name: Download Static Web Content
        uses: actions/download-artifact@v8
        with:
          name: web-content
          path: src/slskd/wwwroot

      - name: Build ${{ matrix.runtime }}
        run: bin/publish --no-prebuild --runtime ${{ matrix.runtime }} --version ${{ env.VERSION }}

      - name: Upload Binaries
        uses: actions/upload-artifact@v7
        with:
          name: slskdn-${{ env.VERSION }}-${{ matrix.runtime }}
          path: dist/${{ matrix.runtime }}
  
  docker:
    name: Build Docker Image
    runs-on: ${{ vars.PREFER_SELF_HOSTED != 'false' && 'self-hosted' || 'ubuntu-latest' }}
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # docker tags aren't compatible with semver, therefore + can't be used to delimit the version and SHA
      # https://github.com/opencontainers/distribution-spec/issues/154
      # CONTAINER_VERSION is used in Docker tags and must use a hyphen (-) delimiter between the tag and SHA
      # APP_VERSION is passed as a Docker build arg and used to publish the app and must use a hyphen (-) for NuGet compatibility
      - name: Set Environment Variables
        run: |
          # Get the latest slskdn tag only
          TAG=$(git tag --sort=-version:refname | grep -E '^\d+\.\d+\.\d+-slskdn\.\d+$' | head -n1)
          if [ -z "$TAG" ]; then
            TAG="0.24.1-slskdn.19"
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "CONTAINER_VERSION=${TAG}.$([[ $GITHUB_REF = refs/tags/* ]] && echo 0 || echo 65534)-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "APP_VERSION=${TAG}.$([[ $GITHUB_REF = refs/tags/* ]] && echo 0 || echo 65534)-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "REVISION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date --iso-8601=s)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Canary
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            TAG=${{ env.TAG }}
            VERSION=${{ env.APP_VERSION }}
            REVISION=${{ env.REVISION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ghcr.io/snapetech/slskdn:${{ env.CONTAINER_VERSION }}
            ghcr.io/snapetech/slskdn:canary
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            VERSION=${{ env.APP_VERSION }}
          tags: |
            ghcr.io/snapetech/slskdn:${{ env.CONTAINER_VERSION }}
            ghcr.io/snapetech/slskdn:${{ env.TAG }}
            ghcr.io/snapetech/slskdn:canary
            ghcr.io/snapetech/slskdn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ${{ vars.PREFER_SELF_HOSTED != 'false' && 'self-hosted' || 'ubuntu-latest' }}
    needs: [build, publish, docker]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Environment Variables
        run: |
          echo "TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          echo "VERSION=${{ needs.build.outputs.version }}" >> $GITHUB_ENV

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: slskdn-*

      - name: Prepare Release Assets
        run: |
          mkdir -p release
          for dir in artifacts/slskdn-*; do
            runtime=$(basename "$dir" | sed "s/slskdn-${{ env.VERSION }}-//")
            echo "Processing $runtime..."
            cd "$dir"
            if [ -f "slskd" ]; then
              chmod +x slskd
            fi
            zip -r "../../release/slskdn-${{ env.TAG }}-$runtime.zip" .
            cd ../..
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Package Workflows
        run: |
          echo "Triggering package builds for ${{ env.TAG }}..."
          gh workflow run release-linux.yml -f tag=${{ env.TAG }}
          gh workflow run release-copr.yml -f tag=${{ env.TAG }}
          gh workflow run release-ppa.yml -f tag=${{ env.TAG }}
          gh workflow run release-packages.yml -f tag=${{ env.TAG }}
          echo "All package workflows triggered!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
