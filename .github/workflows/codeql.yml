name: CodeQL (C#)

on:
  push:
    branches: [master]
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # Keep master scanning focused on security findings; the broader suite
          # turns maintainability heuristics into thousands of repo alerts.
          queries: security-extended
          config: |
            query-filters:
              - exclude:
                  id: cs/log-forging

      - name: Restore dependencies
        run: dotnet restore src/slskd/slskd.csproj

      - name: Build (CodeQL traces compilation)
        run: dotnet build src/slskd/slskd.csproj --no-restore --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:csharp
