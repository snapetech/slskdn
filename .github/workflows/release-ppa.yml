name: Upload to PPA

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to PPA'
        required: true

permissions:
  contents: read
jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Convert 0.24.1-slskdn.7 to 0.24.1.slskdn.7 for debian version
          VERSION=$(echo "$TAG" | sed 's/-slskdn/.slskdn/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Build Frontend
        working-directory: src/web
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Build Backend
        run: |
          dotnet publish src/slskd/slskd.csproj \
            -c Release \
            -o publish-linux-x64 \
            --self-contained true \
            -r linux-x64

      - name: Copy Web Assets
        run: |
          mkdir -p publish-linux-x64/wwwroot
          cp -r src/web/build/* publish-linux-x64/wwwroot/

      - name: Verify Publish Output
        run: |
          test -x publish-linux-x64/slskd || { echo 'missing slskd apphost'; exit 1; }
          find publish-linux-x64 -name 'libcoreclrtraceptprovider.so' -print || true

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper gnupg build-essential

      - name: Import GPG Key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY secret not set. Skipping PPA upload."
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Trust the key
          KEY_ID=$(gpg --list-keys --keyid-format long | grep -A1 "^pub" | tail -1 | awk '{print $1}')
          echo "$KEY_ID:6:" | gpg --import-ownertrust

      - name: Prepare Source Structure
        run: |
          # Create proper directory structure for debian packaging
          mkdir -p slskdn-${{ steps.version.outputs.version }}/usr/lib/slskd
          mkdir -p slskdn-${{ steps.version.outputs.version }}/lib/systemd/system
          mkdir -p slskdn-${{ steps.version.outputs.version }}/etc/slskd
          mkdir -p slskdn-${{ steps.version.outputs.version }}/usr/lib/sysusers.d
          
          # Copy binary files from our build
          cp -r publish-linux-x64/* slskdn-${{ steps.version.outputs.version }}/usr/lib/slskd/
          
          # Copy service files from packaging
          cp packaging/aur/slskd.service slskdn-${{ steps.version.outputs.version }}/lib/systemd/system/
          cp packaging/aur/slskd.yml slskdn-${{ steps.version.outputs.version }}/etc/slskd/
          cp packaging/aur/slskd.sysusers slskdn-${{ steps.version.outputs.version }}/usr/lib/sysusers.d/slskd.conf

      - name: Prepare Source Package
        run: |
          # Create tarball for orig source
          tar -czvf slskdn_${{ steps.version.outputs.version }}.orig.tar.gz slskdn-${{ steps.version.outputs.version }}
          
          # Copy debian directory
          cp -r packaging/debian slskdn-${{ steps.version.outputs.version }}/
          
          # Use timestamp-based PPA revision to avoid conflicts on rebuilds
          PPA_REV=$(date +%Y%m%d%H%M)
          
          # Update changelog
          cd slskdn-${{ steps.version.outputs.version }}
          cat > debian/changelog << EOF
          slskdn (${{ steps.version.outputs.version }}-1ppa${PPA_REV}~jammy) jammy; urgency=medium
          
            * Release ${{ steps.version.outputs.tag }}
          
           -- slskdn <slskdn@proton.me>  $(date -R)
          EOF

      - name: Build Source Package
        run: |
          cd slskdn-${{ steps.version.outputs.version }}
          debuild -S -sa -d -k07E2531E1F470F8008ACCFC996A07606FE65392F

      - name: Preflight Launchpad PPA Upload
        env:
          LAUNCHPAD_SFTP_KEY: ${{ secrets.LAUNCHPAD_SFTP_KEY }}
        run: |
          if [ -n "$LAUNCHPAD_SFTP_KEY" ]; then
            LAUNCHPAD_PPA_SFTP_IPV4=$(getent ahostsv4 ppa.launchpad.net | awk '$2 == "STREAM" { print $1; exit }')
            if [ -z "$LAUNCHPAD_PPA_SFTP_IPV4" ]; then
              echo "::error::Unable to resolve an IPv4 address for ppa.launchpad.net"
              getent ahosts ppa.launchpad.net || true
              exit 1
            fi

            echo "Pinning ppa.launchpad.net to IPv4 ${LAUNCHPAD_PPA_SFTP_IPV4} for PPA SFTP upload"
            echo "${LAUNCHPAD_PPA_SFTP_IPV4} ppa.launchpad.net" | sudo tee -a /etc/hosts
            getent ahosts ppa.launchpad.net

            if ! python3 - <<'PY'
          import socket

          with socket.create_connection(("ppa.launchpad.net", 22), timeout=120) as sock:
              print(f"Connected to {sock.getpeername()[0]}:{sock.getpeername()[1]} over SSH")
          PY
            then
              echo "::error::Launchpad PPA SFTP endpoint is not reachable"
              exit 1
            fi
            exit 0
          fi

          LAUNCHPAD_PPA_FTP_IPV4=$(getent ahostsv4 ppa.launchpad.net | awk '$2 == "STREAM" { print $1; exit }')
          if [ -z "$LAUNCHPAD_PPA_FTP_IPV4" ]; then
            echo "::error::Unable to resolve an IPv4 address for ppa.launchpad.net"
            getent ahosts ppa.launchpad.net || true
            exit 1
          fi

          echo "Pinning ppa.launchpad.net to IPv4 ${LAUNCHPAD_PPA_FTP_IPV4} for PPA FTP upload"
          echo "${LAUNCHPAD_PPA_FTP_IPV4} ppa.launchpad.net" | sudo tee -a /etc/hosts
          getent ahosts ppa.launchpad.net

          if ! python3 - <<'PY'
          import socket

          with socket.create_connection(("ppa.launchpad.net", 21), timeout=120) as sock:
              print(f"Connected to {sock.getpeername()[0]}:{sock.getpeername()[1]}")
          PY
          then
            echo "::error::Launchpad PPA FTP endpoint is not reachable over IPv4"
            exit 1
          fi

      - name: Upload to PPA
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          LAUNCHPAD_SFTP_KEY: ${{ secrets.LAUNCHPAD_SFTP_KEY }}
          LAUNCHPAD_SFTP_USER: ${{ secrets.LAUNCHPAD_SFTP_USER }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "Skipping PPA upload - GPG_PRIVATE_KEY not configured"
            exit 0
          fi
          LAUNCHPAD_SFTP_USER="${LAUNCHPAD_SFTP_USER:-keefshape}"
          ls -la *.changes || true
          CHANGES_FILE=$(find . -name "*.changes" -type f | head -1)
          echo "Found changes file: $CHANGES_FILE"

          gpg --verify "$CHANGES_FILE"
          DSC_FILE=$(awk '/\.dsc$/ { print $NF; exit }' "$CHANGES_FILE")
          if [ -z "$DSC_FILE" ] || [ ! -f "$DSC_FILE" ]; then
            echo "::error::Unable to find signed .dsc referenced by $CHANGES_FILE"
            exit 1
          fi
          gpg --verify "$DSC_FILE"

          mapfile -t SOURCE_FILES < <(
            awk '
              /^Files:/ { in_files = 1; next }
              in_files && /^[A-Za-z0-9-]+:/ { in_files = 0 }
              in_files && NF >= 5 { print $5 }
            ' "$CHANGES_FILE"
          )

          if [ "${#SOURCE_FILES[@]}" -eq 0 ]; then
            echo "::error::No source files found in $CHANGES_FILE"
            exit 1
          fi

          if [ -n "$LAUNCHPAD_SFTP_KEY" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "$LAUNCHPAD_SFTP_KEY" > ~/.ssh/launchpad_ppa
            chmod 600 ~/.ssh/launchpad_ppa
            ssh-keyscan -T 30 -t rsa,ecdsa,ed25519 ppa.launchpad.net >> ~/.ssh/known_hosts 2>/dev/null || true
            cat >> ~/.ssh/config << EOF
          Host ppa.launchpad.net
            HostName ppa.launchpad.net
            User ${LAUNCHPAD_SFTP_USER}
            IdentityFile ~/.ssh/launchpad_ppa
            IdentitiesOnly yes
            BatchMode yes
            PasswordAuthentication no
            KbdInteractiveAuthentication no
            NumberOfPasswordPrompts 0
            StrictHostKeyChecking accept-new
            ConnectTimeout 60
            ServerAliveInterval 30
            ServerAliveCountMax 4
          EOF

            cat > ~/.dput.cf << EOF
          [slskdn-ppa-sftp]
          fqdn = ppa.launchpad.net
          method = sftp
          incoming = ~keefshape/ubuntu/slskdn/
          login = ${LAUNCHPAD_SFTP_USER}
          allow_unsigned_uploads = 0
          EOF

            echo "Uploading $(basename "$CHANGES_FILE") to Launchpad PPA over SFTP"
            timeout --preserve-status 1800 dput --config ~/.dput.cf slskdn-ppa-sftp "$CHANGES_FILE"
          else
            for source_file in "${SOURCE_FILES[@]}" "$(basename "$CHANGES_FILE")"; do
              if [ ! -f "$source_file" ]; then
                echo "::error::Source upload file not found: $source_file"
                exit 1
              fi

              echo "Uploading $source_file to Launchpad PPA over anonymous FTP"
              curl --fail --show-error --silent --verbose \
                --ipv4 \
                --ftp-pasv \
                --retry 5 \
                --retry-all-errors \
                --retry-delay 10 \
                --connect-timeout 120 \
                --max-time 900 \
                --upload-file "$source_file" \
                "ftp://anonymous:anonymous@ppa.launchpad.net/~keefshape/ubuntu/slskdn/$source_file"
            done
          fi

          echo "✅ Uploaded to PPA: slskdn"
