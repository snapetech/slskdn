name: CI Enhancements

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-slskdn.[0-9]+"
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10'
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
jobs:
  performance-regression:
    name: Performance Regression Testing
    runs-on: ${{ vars.PREFER_SELF_HOSTED != 'false' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET (GitHub-hosted)
        if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify .NET (self-hosted)
        if: ${{ runner.environment == 'self-hosted' }}
        run: |
          echo "Using pre-installed .NET SDK"
          dotnet --version

      - name: Build Performance Benchmark Project
        run: |
          dotnet build tests/slskd.Tests.Performance/slskd.Tests.Performance.csproj --configuration Release --no-incremental
        continue-on-error: true

      - name: Run Performance Benchmarks
        id: benchmarks
        run: |
          dotnet run --project tests/slskd.Tests.Performance/slskd.Tests.Performance.csproj \
            --configuration Release \
            --no-build \
            -- \
            --exporters json \
            --artifacts BenchmarkDotNet.Artifacts
        continue-on-error: true

      - name: Upload Benchmark Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            tests/slskd.Tests.Performance/BenchmarkDotNet.Artifacts/results/*.json
            tests/slskd.Tests.Performance/BenchmarkDotNet.Artifacts/results/*.md
          retention-days: 30
          if-no-files-found: ignore

      - name: Compare Against Baseline
        if: steps.benchmarks.outcome == 'success'
        run: |
          echo "## Performance Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Benchmarks completed. Results uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Review benchmark results in artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Compare against previous runs to detect regressions" >> $GITHUB_STEP_SUMMARY
          echo "- Investigate any significant performance degradation (>10%)" >> $GITHUB_STEP_SUMMARY

  load-testing:
    name: Load Testing
    runs-on: ${{ vars.PREFER_SELF_HOSTED != 'false' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET (GitHub-hosted)
        if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify .NET (self-hosted)
        if: ${{ runner.environment == 'self-hosted' }}
        run: dotnet --version

      - name: Build Application
        run: |
          dotnet build src/slskd/slskd.csproj -c Release --no-incremental

      - name: Start Application
        run: |
          # Start slskdn in background for load testing
          dotnet run --project src/slskd/slskd.csproj -c Release --no-build &
          echo $! > slskdn.pid
          # Wait for application to start (slskdn listens on port 5099 by default)
          timeout 60 bash -c 'until curl -f http://localhost:5099/api/v0/session/enabled; do sleep 2; done' || true
        continue-on-error: true

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Create Load Test Script
        run: |
          cat > load-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          import { Rate } from 'k6/metrics';

          const errorRate = new Rate('errors');

          export const options = {
            stages: [
              { duration: '30s', target: 10 },   // Ramp up to 10 users
              { duration: '1m', target: 50 },     // Ramp up to 50 users
              { duration: '2m', target: 100 },    // Stay at 100 users
              { duration: '1m', target: 50 },     // Ramp down to 50 users
              { duration: '30s', target: 0 },    // Ramp down to 0 users
            ],
            thresholds: {
              'http_req_duration': ['p(95)<500', 'p(99)<1000'], // 95% of requests < 500ms, 99% < 1s
              'http_req_failed': ['rate<0.01'],                 // Error rate < 1%
              'errors': ['rate<0.01'],                           // Custom error rate < 1%
            },
          };

          const BASE_URL = __ENV.BASE_URL || 'http://localhost:5099';

          export default function () {
            // Test session endpoint
            const sessionRes = http.get(`${BASE_URL}/api/v0/session/enabled`);
            check(sessionRes, {
              'session status is 200': (r) => r.status === 200,
            }) || errorRate.add(1);

            // Test application state endpoint
            const stateRes = http.get(`${BASE_URL}/api/v0/application/state`);
            check(stateRes, {
              'state status is 200': (r) => r.status === 200,
            }) || errorRate.add(1);

            // Test search creation (POST)
            const searchPayload = JSON.stringify({ query: 'test', scope: 'all' });
            const searchRes = http.post(`${BASE_URL}/api/v0/searches`, searchPayload, {
              headers: { 'Content-Type': 'application/json' },
            });
            check(searchRes, {
              'search creation status is 201 or 200': (r) => r.status === 201 || r.status === 200,
            }) || errorRate.add(1);

            sleep(1);
          }
          EOF

      - name: Run Load Tests
        id: loadtest
        run: |
          k6 run --out json=load-test-results.json load-test.js || true
        continue-on-error: true
        env:
          BASE_URL: http://localhost:5099

      - name: Upload Load Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: load-test-results
          path: |
            load-test-results.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Stop Application
        if: always()
        run: |
          if [ -f slskdn.pid ]; then
            kill $(cat slskdn.pid) || true
            rm slskdn.pid
          fi
          pkill -f "dotnet.*slskd" || true

      - name: Report Load Test Results
        if: steps.loadtest.outcome == 'success'
        run: |
          echo "## Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Load tests completed. Results uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Ramp up: 10 → 50 → 100 users" >> $GITHUB_STEP_SUMMARY
          echo "- Sustained load: 100 users for 2 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- Thresholds: 95% < 500ms, 99% < 1s, error rate < 1%" >> $GITHUB_STEP_SUMMARY

  dependency-scanning:
    name: Dependency Scanning
    runs-on: ${{ vars.PREFER_SELF_HOSTED != 'false' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET (GitHub-hosted)
        if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Scan NuGet Dependencies
        run: |
          # Use -p:Version=0.0.0 to prevent VERSION env var from being read as MSBuild $(Version),
          # which would cause NuGet to reject build-main-* prefixed strings as invalid semver.
          dotnet restore src/slskd/slskd.csproj -p:Version=0.0.0
          dotnet list src/slskd/slskd.csproj package --vulnerable --include-transitive 2>&1 | tee /tmp/nuget-vuln.txt
          if grep -qiE 'High|Critical' /tmp/nuget-vuln.txt; then
            echo "::error::NuGet HIGH or CRITICAL vulnerability detected"
            cat /tmp/nuget-vuln.txt
            exit 1
          fi

      - name: Scan npm Dependencies
        run: |
          cd src/web
          npm audit --audit-level=high --production || true

      - name: Report Results
        if: always()
        run: |
          echo "## Dependency Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- NuGet: checked for HIGH/CRITICAL CVEs" >> $GITHUB_STEP_SUMMARY
          echo "- npm: checked for HIGH/CRITICAL CVEs (production deps)" >> $GITHUB_STEP_SUMMARY

  container-scanning:
    name: Container Scanning (Trivy)
    runs-on: ${{ vars.PREFER_SELF_HOSTED != 'false' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker Image
        run: docker build -t slskdn:test -f Dockerfile .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: slskdn:test
          exit-code: '0'
          severity: HIGH,CRITICAL
          format: json
          output: trivy-results.json
        continue-on-error: true

      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Report Results
        if: always()
        run: |
          echo "## Container Scan Results (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "- Image: Dockerfile" >> $GITHUB_STEP_SUMMARY
          echo "- Severity: HIGH, CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- Results uploaded as artifacts" >> $GITHUB_STEP_SUMMARY
