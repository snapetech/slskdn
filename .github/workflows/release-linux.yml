name: Release Linux Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build'
        required: true

permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Build Frontend
        working-directory: src/web
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Build Backend
        run: |
          dotnet publish src/slskd/slskd.csproj \
            -c Release \
            -o publish-linux-${{ matrix.arch }} \
            --self-contained true \
            -r linux-${{ matrix.arch }} \
            -p:PublishReadyToRun=false

      - name: Copy Web Assets
        run: |
          cp -r src/web/build/* publish-linux-${{ matrix.arch }}/wwwroot/

      - name: Get Version
        id: version
        run: |
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Create Zip
        run: |
          cd publish-linux-${{ matrix.arch }}
          zip -r ../slskdn-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.zip .
          cp ../slskdn-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.zip ../slskdn-main-linux-${{ matrix.arch }}.zip

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            slskdn-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.zip
            slskdn-main-linux-${{ matrix.arch }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: slskdn-linux-${{ matrix.arch }}
          path: slskdn-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.zip

  update-aur:
    needs: build-linux
    runs-on: ubuntu-latest
    # Run on both release events and workflow_dispatch (triggered by CI after release)
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Version
        id: version
        run: |
          # Get tag from either workflow_dispatch input or release ref
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          # Convert 0.24.1-slskdn.3 to 0.24.1.slskdn.3 for PKGBUILD
          PKGVER=$(echo $TAG | sed 's/-slskdn/.slskdn/')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "pkgver=${PKGVER}" >> $GITHUB_OUTPUT

      - name: Wait for Linux Release Asset
        id: wait_for_linux_asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURL_AUTH_ARGS=()
          if [ -n "$GH_TOKEN" ]; then
            CURL_AUTH_ARGS=(-H "Authorization: Bearer ${GH_TOKEN}")
          fi

          ASSET_NAMES=(
            "slskdn-main-linux-x64.zip"
            "slskdn-${{ steps.version.outputs.tag }}-linux-x64.zip"
          )

          for attempt in {1..20}; do
            for ASSET_NAME in "${ASSET_NAMES[@]}"; do
              ASSET_URL="https://github.com/snapetech/slskdn/releases/download/${{ steps.version.outputs.tag }}/${ASSET_NAME}"
              echo "Attempt $attempt: checking ${ASSET_NAME}..."

              if curl -fsSL "${CURL_AUTH_ARGS[@]}" -H "Accept: application/octet-stream" "$ASSET_URL" -o release-linux-x64.zip; then
                echo "Found Linux asset: ${ASSET_NAME}"
                exit 0
              fi
            done

            if [ "$attempt" -eq 20 ]; then
              echo "Failed to download a Linux x64 asset after 10 minutes"
              exit 1
            fi

            echo "Assets not ready, waiting 30s..."
            sleep 30
          done

      - name: Update PKGBUILDs
        run: |
          cd packaging/aur
          # Compute hashes for static files (these never change between releases)
          SVC_SUM=$(sha256sum slskd.service | awk '{print $1}')
          YML_SUM=$(sha256sum slskd.yml     | awk '{print $1}')
          SYS_SUM=$(sha256sum slskd.sysusers | awk '{print $1}')
          echo "slskd.service : $SVC_SUM"
          echo "slskd.yml     : $YML_SUM"
          echo "slskd.sysusers: $SYS_SUM"

          # Update binary package PKGBUILD
          # source=() order: zip slskd.service slskd.yml slskd.sysusers
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.pkgver }}/" PKGBUILD-bin
          # keep binary archive hash on SKIP since release assets are mutable and can be replaced in-place
          sed -i "s/^sha256sums=.*/sha256sums=('SKIP' '$SVC_SUM' '$YML_SUM' '$SYS_SUM')/" PKGBUILD-bin

          # Update source package PKGBUILD (tarball is SKIP, static file hashes are the same)
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.pkgver }}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('SKIP' '$SVC_SUM' '$YML_SUM' '$SYS_SUM')/" PKGBUILD

          bash ../packaging/scripts/validate-aur-pkgbuild-hashes.sh PKGBUILD PKGBUILD-bin

      - name: Setup and Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "⚠️ AUR_SSH_KEY not configured. Skipping AUR push."
            echo "To enable automatic AUR updates, add AUR_SSH_KEY secret."
            exit 0
          fi
          
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          
          # Configure git
          git config --global user.email "slskdn@proton.me"
          git config --global user.name "slskdn"
          
          # Function to generate .SRCINFO from PKGBUILD (without makepkg)
          generate_srcinfo() {
            local pkgbuild="$1"
            source "$pkgbuild"
            
            echo "pkgbase = ${pkgname}"
            echo "	pkgdesc = ${pkgdesc}"
            echo "	pkgver = ${pkgver}"
            echo "	pkgrel = ${pkgrel}"
            echo "	url = ${url}"
            for arch in "${arch[@]}"; do echo "	arch = $arch"; done
            echo "	license = ${license[0]}"
            for dep in "${depends[@]}"; do echo "	depends = $dep"; done
            for dep in "${makedepends[@]}"; do echo "	makedepends = $dep"; done
            for dep in "${optdepends[@]}"; do echo "	optdepends = $dep"; done
            for prov in "${provides[@]}"; do echo "	provides = $prov"; done
            for conf in "${conflicts[@]}"; do echo "	conflicts = $conf"; done
            for repl in "${replaces[@]}"; do echo "	replaces = $repl"; done
            for opt in "${options[@]}"; do echo "	options = $opt"; done
            for bak in "${backup[@]}"; do echo "	backup = $bak"; done
            for src in "${source[@]}"; do echo "	source = $src"; done
            for sum in "${sha256sums[@]}"; do echo "	sha256sums = $sum"; done
            echo ""
            echo "pkgname = ${pkgname}"
          }
          
          # Clone and update AUR repo (slskdn-bin)
          git clone ssh://aur@aur.archlinux.org/slskdn-bin.git aur-repo || mkdir aur-repo
          cd aur-repo
          cp ../packaging/aur/PKGBUILD-bin PKGBUILD
          cp ../packaging/aur/slskd.service .
          cp ../packaging/aur/slskd.yml .
          cp ../packaging/aur/slskd.sysusers .
          cp ../packaging/aur/slskd.install .
          generate_srcinfo PKGBUILD > .SRCINFO
          git add -A
          git commit -m "Update to ${{ steps.version.outputs.tag }}" || true
          git push || echo "AUR push failed - may need manual intervention"
          cd ..
          
          # Clone and update AUR repo (slskdn source)
          git clone ssh://aur@aur.archlinux.org/slskdn.git aur-repo-src || mkdir aur-repo-src
          cd aur-repo-src
          cp ../packaging/aur/PKGBUILD .
          cp ../packaging/aur/slskd.service .
          cp ../packaging/aur/slskd.yml .
          cp ../packaging/aur/slskd.sysusers .
          cp ../packaging/aur/slskd.install .
          generate_srcinfo PKGBUILD > .SRCINFO
          git add -A
          git commit -m "Update to ${{ steps.version.outputs.tag }}" || true
          git push || echo "AUR push failed - may need manual intervention"
