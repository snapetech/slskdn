# Dependabot configuration for slskdn
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Ignore major updates for packages we keep aligned with upstream slskd,
# or where a major bump requires deliberate evaluation.
# (see docs/dev/PR-upstream-alignment-evaluation.md). Patch/minor PRs still allowed.

version: 2
updates:
  # NPM (frontend)
  - package-ecosystem: "npm"
    directory: "/src/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      npm-nonbreaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Keep aligned with upstream slskd (react 16, router 5, etc.)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "uuid"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Current 4.25.x releases require React 17+, but the repo is pinned to React 16.8.6.
      # Keep this package frozen until the frontend migration is done deliberately.
      - dependency-name: "@uiw/react-codemirror"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      # react-scripts is EOL and can't be bumped without breaking the build;
      # remaining npm vulns are locked inside its transitive dep tree.
      # Long-term fix: migrate to Vite.
      - dependency-name: "react-scripts"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]

  # NuGet (.NET backend)
  - package-ecosystem: "nuget"
    directory: "/src/slskd"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      nuget-nonbreaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Keep aligned with upstream slskd (net8.0, 8.0.x Microsoft.*, etc.)
      - dependency-name: "Microsoft.Data.Sqlite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.AspNetCore.SignalR.Client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.AspNetCore.Authentication.JwtBearer"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.CodeAnalysis.NetAnalyzers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.CodeAnalysis.CSharp"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "Microsoft.CodeAnalysis.Analyzers"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "Microsoft.EntityFrameworkCore"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.EntityFrameworkCore.Sqlite.Core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "FluentFTP"
        update-types: ["version-update:semver-major"]
      - dependency-name: "MessagePack"
        update-types: ["version-update:semver-major"]
      # Soulseek client: keep aligned with upstream slskd to avoid API drift
      - dependency-name: "Soulseek"
        update-types: ["version-update:semver-major"]
      # Serilog major bumps need evaluation (API changes across sinks)
      - dependency-name: "Serilog"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Serilog.AspNetCore"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Swashbuckle.AspNetCore"
        update-types: ["version-update:semver-major"]
      # AWSSDK major bump (3→4) has breaking changes, evaluate separately
      - dependency-name: "AWSSDK.S3"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    exclude-paths:
      - "/.github/workflows/check-upstream-access.yml"
    groups:
      github-actions-nonbreaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
