# Dependabot configuration for slskdn
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
version: 2
updates:
  # NPM (frontend)
  - package-ecosystem: "npm"
    directory: "/src/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      npm-nonbreaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  # NuGet (.NET backend)
  - package-ecosystem: "nuget"
    directory: "/src/slskd"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      nuget-nonbreaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    exclude-paths:
      - "/.github/workflows/check-upstream-access.yml"
    groups:
      github-actions-nonbreaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
