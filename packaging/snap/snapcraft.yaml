name: slskdn
base: core22
version: '0.24.5-slskdn.129'
summary: 🔋 The batteries included fork of slskd with 24+ new features
description: |
  The batteries included fork of slskd with 24+ new features: decentralized pods,
  content validation, swarm downloads, DHT mesh networking, auto-replace, wishlist,
  security hardening. Modern web UI for the Soulseek network.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.24.5-slskdn.129/slskdn-main-linux-x64.zip
    source-checksum: sha256/57ea2ee5e3d81fbeebd7a0f8c54dc56cce0f93ff09b8c8f5d992b20a30ecd92a
    stage-packages:
      - libicu70
      - libssl3
