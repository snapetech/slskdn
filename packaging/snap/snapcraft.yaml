name: slskdn
base: core22
version: '0.24.5-slskdn.140'
summary: 🔋 The batteries included fork of slskd with 24+ new features
description: |
  The batteries included fork of slskd with 24+ new features: decentralized pods,
  content validation, swarm downloads, DHT mesh networking, auto-replace, wishlist,
  security hardening. Modern web UI for the Soulseek network.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.24.5-slskdn.140/slskdn-main-linux-glibc-x64.zip
    source-checksum: sha256/eccd219b7858e4e2f97ac9c6e3178c3c047dd4bb124e74aea83c02b73801f61d
    stage-packages:
      - libicu70
      - libssl3
