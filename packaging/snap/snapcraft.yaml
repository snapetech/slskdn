name: slskdn
base: core22
version: '0.24.5-slskdn.170'
summary: slskdN, an unofficial batteries-included fork of slskd
description: |
  slskdN is an unofficial fork of slskd with batteries-included Soulseek features:
  SongID, Discovery Graph, multi-source downloads, DHT mesh networking,
  auto-replace, wishlist, and security hardening.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.24.5-slskdn.170/slskdn-main-linux-glibc-x64.zip
    source-checksum: sha256/011d3e4f2e54f2e2d5b3912afecce94182418f9cb65542ef3b54329a82b49513
    stage-packages:
      - libicu70
      - libssl3
