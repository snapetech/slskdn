name: slskdn
base: core22
version: '0.24.5-slskdn.90'
summary: 🔋 The batteries included fork of slskd with 24+ new features
description: |
  The batteries included fork of slskd with 24+ new features: decentralized pods,
  content validation, swarm downloads, DHT mesh networking, auto-replace, wishlist,
  security hardening. Modern web UI for the Soulseek network.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.24.5-slskdn.90/slskdn-main-linux-x64.zip
    source-checksum: sha256/5f202b5f8c8c7c81c6de7b2eb0ae67ff1fb1d7f8fea1ae74103c261d5cbc1cc1
    stage-packages:
      - libicu70
      - libssl3
