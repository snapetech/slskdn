name: slskdn
base: core22
version: '0.24.5-slskdn.113'
summary: 🔋 The batteries included fork of slskd with 24+ new features
description: |
  The batteries included fork of slskd with 24+ new features: decentralized pods,
  content validation, swarm downloads, DHT mesh networking, auto-replace, wishlist,
  security hardening. Modern web UI for the Soulseek network.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.24.5-slskdn.113/slskdn-main-linux-x64.zip
    source-checksum: sha256/c8785feb2ae9c6bcaa1ef0740a5cc437ea2317c6c9064da1aa6c1ae2e96996ca
    stage-packages:
      - libicu70
      - libssl3
