name: slskdn
base: core22
version: '0.24.5-slskdn.117'
summary: 🔋 The batteries included fork of slskd with 24+ new features
description: |
  The batteries included fork of slskd with 24+ new features: decentralized pods,
  content validation, swarm downloads, DHT mesh networking, auto-replace, wishlist,
  security hardening. Modern web UI for the Soulseek network.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.24.5-slskdn.117/slskdn-main-linux-x64.zip
    source-checksum: sha256/c00c4f46a0172d21a45f77eb49b02790f0adf3142c2ec1fb061823cef3ab074b
    stage-packages:
      - libicu70
      - libssl3
