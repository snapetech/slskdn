name: slskdn
base: core22
version: '0.25.1-slskdn.1'
summary: 🔋 The batteries included fork of slskd with 24+ new features
description: |
  The batteries included fork of slskd with 24+ new features: decentralized pods,
  content validation, swarm downloads, DHT mesh networking, auto-replace, wishlist,
  security hardening. Modern web UI for the Soulseek network.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.25.1-slskdn.1/slskdn-main-linux-glibc-x64.zip
    source-checksum: sha256/011d3e4f2e54f2e2d5b3912afecce94182418f9cb65542ef3b54329a82b49513
    stage-packages:
      - libicu70
      - libssl3
