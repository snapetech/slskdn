name: slskdn
base: core22
version: '0.24.5-slskdn.156'
summary: 🔋 The batteries included fork of slskd with 24+ new features
description: |
  The batteries included fork of slskd with 24+ new features: decentralized pods,
  content validation, swarm downloads, DHT mesh networking, auto-replace, wishlist,
  security hardening. Modern web UI for the Soulseek network.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.24.5-slskdn.156/slskdn-main-linux-glibc-x64.zip
    source-checksum: sha256/4eb51d12503c9a1ec50107f0baa4222d04ada06cfae976ada6692dbe2cbfc912
    stage-packages:
      - libicu70
      - libssl3
