name: slskdn
base: core22
version: '0.24.5-slskdn.169'
summary: 🔋 The batteries included fork of slskd with 24+ new features
description: |
  The batteries included fork of slskd with 24+ new features: decentralized pods,
  content validation, swarm downloads, DHT mesh networking, auto-replace, wishlist,
  security hardening. Modern web UI for the Soulseek network.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.24.5-slskdn.169/slskdn-main-linux-glibc-x64.zip
    source-checksum: sha256/98611723b5ddacc5ccacb68d989c1107603a101f4c3041691a4051a4f9bf0ff1
    stage-packages:
      - libicu70
      - libssl3
