name: slskdn
base: core22
version: '0.24.5-slskdn.136'
summary: 🔋 The batteries included fork of slskd with 24+ new features
description: |
  The batteries included fork of slskd with 24+ new features: decentralized pods,
  content validation, swarm downloads, DHT mesh networking, auto-replace, wishlist,
  security hardening. Modern web UI for the Soulseek network.
grade: stable
confinement: strict
architectures:
  - amd64

apps:
  slskdn:
    command: slskd
    daemon: simple
    plugs: [network, network-bind, home, removable-media]
    environment:
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: $SNAP_USER_COMMON/.net

parts:
  slskdn:
    plugin: dump
    source: https://github.com/snapetech/slskdn/releases/download/0.24.5-slskdn.136/slskdn-main-linux-glibc-x64.zip
    source-checksum: sha256/159187c81d75d047db5d1d91a2ad6ecf99de261bfcfec4e510d34fc7ed0d07bc
    stage-packages:
      - libicu70
      - libssl3
